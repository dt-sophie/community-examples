metadata:
  version: '1'
  dependencies:
    apps:
    - id: dynatrace.automations
      version: ^1.2538.1
    - id: dynatrace.jira
      version: ^5.6.3
  inputs:
  - type: connection
    schema: app:dynatrace.jira:connection
    targets:
    - tasks.create_jira_issue.connectionId
    - tasks.search_jira_issue.connectionId
workflow:
  title: '[Security-AI-Demo] RVA Critical & High Vulnerabilities - Jira ticket'
  description: ''
  schemaVersion: 3
  trigger:
    eventTrigger:
      isActive: true
      filterQuery: "event.type == \"VULNERABILITY_STATUS_CHANGE_EVENT\"\nAND (vulnerability.risk.level\
        \ == \"CRITICAL\" OR vulnerability.risk.level == \"HIGH\") \nAND (event.status_transition\
        \ == \"NEW_OPEN\" OR event.status_transition == \"REOPEN\")\nAND event.level\
        \ == \"VULNERABILITY\"\nAND vulnerability.stack != \"CODE\"\n"
      uniqueExpression: null
      triggerConfiguration:
        type: event
        value:
          query: "event.type == \"VULNERABILITY_STATUS_CHANGE_EVENT\"\nAND (vulnerability.risk.level\
            \ == \"CRITICAL\" OR vulnerability.risk.level == \"HIGH\") \nAND (event.status_transition\
            \ == \"NEW_OPEN\" OR event.status_transition == \"REOPEN\")\nAND event.level\
            \ == \"VULNERABILITY\"\nAND vulnerability.stack != \"CODE\"\n"
          eventType: security.events
  result: null
  type: STANDARD
  input:
    affected.entity: 'DEMO: process-group-name'
    remediation.info: 'DEMO: Remediation information from RVA'
    vulnerability.id: DEMO-CVE-2024-12345
    affected.entityId: PROCESS_GROUP-XXXXXXXXXXXX
    vulnerability.cve: CVE-2024-12345
    vulnerability.title: Critical Remote Code Execution Vulnerability
    vulnerability.riskLevel: CRITICAL
    vulnerability.riskScore: 9.8
    vulnerability.description: 'DEMO: Vulnerability description from RVA'
  hourlyExecutionLimit: 1000
  guide: '# RVA Critical Vulnerabilities Agent


    Get tangible assistance to remediate critical vulnerabilities detected by Runtime
    Vulnerability Analytics (RVA). This workflow automatically analyzes critical vulnerabilities,
    generates remediation guidance, and pushes the findings to Jira for tracking.


    # Prerequisites


    * [Runtime Vulnerability Analytics](https://docs.dynatrace.com/docs/shortlink/vulnerability-analytics)
    is set up and enabled for your environment

    * This workflow should be triggered as a sub-workflow with inputs representing
    critical vulnerabilities from RVA.


    # How to Setup


    1. During the template deployment select an existing Jira connection or create
    a new one.

    2. After the workflow deployment, configure the following parameters in the [`create_jira_issue`](?task=create_jira_issue&tab=input)
    task:

    * Project - your Jira project name (for example, `Security Project`).

    * Issue type - your Jira issue type name (for example, `Security Issue`).

    * Assignee - select a user from a drop-down or specify a user Jira ID.

    * Reporter - select a user from a drop-down or specify a user Jira ID.

    * (optional) Labels - comma-separated list of labels to be applied on the created
    Jira ticket.

    3. Enable the workflow trigger.


    # Workflow flow


    1. The workflow checks if there already is an open Jira ticket for the particular
    vulnerability.

    2. Based on the vulnerability details, remediation guidance is generated using
    Davis AI.

    3. The resulting remediation suggestion is reported to Jira for tracking.'
  tasks:
    create_jira_issue:
      name: create_jira_issue
      input:
        labels:
        - security-vulnerability
        - <label>dt-appsec-workflow</label>
        project:
          id: ''
        summary: '{{ result("get_vulnerability_info").records[0]["vulnerability.risk.level"]
          }} vulnerability detected: {{ result("get_vulnerability_info").records[0]["vulnerability.display_id"]
          }} - {{ result("get_vulnerability_info").records[0]["vulnerability.title"]
          }} affecting {{ result("get_vulnerability_info").records[0]["affected_entities.count"]
          }} entities

          '
        reporter:
          id: ''
        issueType:
          id: ''
        components: []
        description: '{{ result("get_vulnerability_info").records[0]["vulnerability.risk.level"]
          }} vulnerability detected: {{ result("get_vulnerability_info").records[0]["vulnerability.display_id"]
          }} - {{ result("get_vulnerability_info").records[0]["vulnerability.title"]
          }} affecting {{ result("get_vulnerability_info").records[0]["affected_entities.count"]
          }} entities


          h2. Vulnerability Details


          * *CVE:* {{ result("get_vulnerability_info").records[0]["vulnerability.references.cve"]
          }}

          * *Risk Level:* {{ result("get_vulnerability_info").records[0]["vulnerability.risk.level"]
          }}

          * *Risk Score:* {{ result("get_vulnerability_info").records[0]["vulnerability.risk.score"]
          }}

          * *Description:* {{ result("get_vulnerability_info").records[0]["vulnerability.description"]
          }}


          [Open vulnerability in Dynatrace]({{ result("get_vulnerability_info").records[0]["vulnerability.url"]
          }})'
        connectionId: ''
        fieldSetters: []
      action: dynatrace.jira:jira-create-issue
      active: true
      position:
        x: 0
        y: 3
      conditions:
        custom: '{{ not result("search_jira_issue") }}'
        states:
          search_jira_issue: OK
      description: Create new Jira issue for critical vulnerability
      predecessors:
      - search_jira_issue
    search_jira_issue:
      name: search_jira_issue
      input:
        jql: summary ~ "vulnerability detected {{ result("get_vulnerability_info").records[0]["vulnerability.display_id"]
          }}" AND statusCategory != Done
        expand: []
        fields:
        - id
        - key
        connectionId: ''
      action: dynatrace.jira:jira-jql-search
      position:
        x: 0
        y: 2
      conditions:
        states:
          get_vulnerability_info: OK
      description: Search for existing Jira issues for this vulnerability
      predecessors:
      - get_vulnerability_info
    get_vulnerability_info:
      name: get_vulnerability_info
      input:
        query: 'fetch security.events

          | filter event.type == "VULNERABILITY_STATE_REPORT_EVENT"

          AND event.level == "VULNERABILITY"

          AND vulnerability.id == "{{event()["vulnerability.id"] }}"

          | limit 1'
      action: dynatrace.automations:execute-dql-query
      position:
        x: 0
        y: 1
      description: Make use of Dynatrace Grail data in your workflow.
      predecessors: []
      customSampleResult:
        records:
        - event.id: '15435339850609249255_1769526315718000000'
          timestamp: '2026-01-27T15:05:15.718000000Z'
          event.kind: SECURITY_EVENT
          event.name: Vulnerability historical state report event
          event.type: VULNERABILITY_STATE_REPORT_EVENT
          event.level: VULNERABILITY
          event.status: OPEN
          event.category: VULNERABILITY_MANAGEMENT
          event.provider: Dynatrace
          vulnerability.id: '15435339850609249255'
